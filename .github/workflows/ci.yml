name: repository-ci

on:
  push:
  pull_request:

jobs:
  static-and-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install host dependencies
        run: python -m pip install -r requirements-host.txt
      - name: Compile Python
        run: |
          python -m py_compile \
            python/run_test.py \
            python/run_e2e.py \
            python/bevformer.py \
            python/acceptance.py \
            python/temporal.py \
            python/utils.py \
            python/runtime_api.py \
            python/postprocess_api.py \
            python/bevformer_aidlite_qnn240_e2e_performance_v1.py \
            python/functional_mother.py \
            python/portable_numpy_nmsfreecoder.py \
            python/verify_contract.py \
            tools/copy_demo_assets.py
      - name: Check shell syntax
        run: |
          bash -n tools/validate_host.sh
          bash -n tools/run_remote.sh
          bash -n tools/run_board.sh
          bash -n tools/preflight_host.sh
          bash -n tools/preflight_board.sh
          bash -n tools/copy_models.sh
      - name: Validate JSON contract
        run: python -m json.tool configs/nms_runtime_contract.json >/dev/null
      - name: Run unit tests
        run: python -m pytest -q
