name: host-tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-host.txt
      - run: python -m py_compile python/run_test.py python/bevformer.py python/temporal.py python/utils.py python/runtime_api.py python/postprocess_api.py python/verify_contract.py
      - run: bash -n tools/run_remote.sh tools/run_board.sh tools/preflight_host.sh tools/preflight_board.sh tools/copy_models.sh
      - run: python -m pytest -q
